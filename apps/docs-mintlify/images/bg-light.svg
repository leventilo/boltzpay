<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- Grain noise -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Soft violet wash — top center -->
    <radialGradient id="glowViolet" cx="50%" cy="0%" r="55%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#c9a0d4" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#fafaf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm lime whisper — top right -->
    <radialGradient id="glowLime" cx="75%" cy="5%" r="30%" fx="75%" fy="5%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#fafaf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1440" height="900" fill="#fafaf8"/>

  <!-- Violet wash -->
  <rect width="1440" height="900" fill="url(#glowViolet)"/>

  <!-- Lime accent -->
  <rect width="1440" height="900" fill="url(#glowLime)"/>

  <!-- Subtle horizontal rules -->
  <line x1="0" y1="200" x2="1440" y2="200" stroke="#d8d8d2" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.4"/>
  <line x1="0" y1="500" x2="1440" y2="500" stroke="#d8d8d2" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.3"/>
  <line x1="0" y1="800" x2="1440" y2="800" stroke="#d8d8d2" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.2"/>

  <!-- Subtle vertical rails -->
  <line x1="360" y1="0" x2="360" y2="900" stroke="#d8d8d2" stroke-width="0.5" stroke-dasharray="2 12" opacity="0.2"/>
  <line x1="720" y1="0" x2="720" y2="900" stroke="#d8d8d2" stroke-width="0.5" stroke-dasharray="2 12" opacity="0.25"/>
  <line x1="1080" y1="0" x2="1080" y2="900" stroke="#d8d8d2" stroke-width="0.5" stroke-dasharray="2 12" opacity="0.2"/>

  <!-- Grain overlay -->
  <rect width="1440" height="900" filter="url(#grain)" opacity="0.012"/>
</svg>
