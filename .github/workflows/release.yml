name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile

      # ── Show what changed since last release ──

      - name: Changes summary
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "First release — publishing all packages"
          else
            echo "Changes since $TAG:"
            echo ""
            git diff --stat "$TAG"...HEAD
          fi

      # ── Bump all versions ──

      - name: Bump versions
        id: bump
        run: node scripts/bump-versions.mjs ${{ inputs.bump }}

      # ── Build ──

      - name: Build
        run: pnpm turbo build

      # ── Publish npm (topological order) ──

      - name: Publish npm packages
        run: |
          PUBLISHED=0
          SKIPPED=0
          for dir in packages/core packages/protocols packages/sdk packages/mcp packages/cli packages/ai-sdk integrations/n8n; do
            PKG_NAME=$(node -p "require('./$dir/package.json').name")
            echo "Publishing $PKG_NAME..."
            if (cd "$dir" && pnpm publish --access public --no-git-checks 2>&1); then
              PUBLISHED=$((PUBLISHED + 1))
            else
              SKIPPED=$((SKIPPED + 1))
              echo "  -> skipped (already published or error)"
            fi
          done
          echo ""
          echo "npm: $PUBLISHED published, $SKIPPED skipped"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # ── Publish PyPI ──

      - name: Build Python packages
        run: |
          pip install build
          (cd integrations/langchain && python -m build)
          (cd integrations/crewai && python -m build)

      - name: Publish langchain-boltzpay to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/langchain/dist/
          skip-existing: true

      - name: Publish boltzpay-crewai to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/crewai/dist/
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

      # ── Commit, tag & push ──

      - name: Commit & tag
        run: |
          VERSION="v${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): ${VERSION}"
          git tag "${VERSION}"
          git push origin main --tags

      # ── GitHub Release ──

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="v${{ steps.bump.outputs.new_version }}"
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --generate-notes \
              --notes-start-tag "${PREV_TAG}"
          else
            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --generate-notes
          fi

      # ── Summary ──

      - name: Job summary
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          echo "## Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### npm (7 packages)" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/core" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/protocols" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/sdk" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/mcp" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/cli" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/ai-sdk" >> $GITHUB_STEP_SUMMARY
          echo "- @boltzpay/n8n-nodes-boltzpay" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PyPI (2 packages)" >> $GITHUB_STEP_SUMMARY
          echo "- langchain-boltzpay" >> $GITHUB_STEP_SUMMARY
          echo "- boltzpay-crewai" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Auto-deployed" >> $GITHUB_STEP_SUMMARY
          echo "- boltzpay.ai (Vercel)" >> $GITHUB_STEP_SUMMARY
          echo "- docs.boltzpay.ai (Mintlify)" >> $GITHUB_STEP_SUMMARY
